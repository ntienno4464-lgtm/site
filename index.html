<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WealthRise Hub | Make Money Online 2026</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
scroll-behavior:smooth;
}

body{
font-family:'Poppins',sans-serif;
background:#07111f;
color:#fff;
overflow-x:hidden;
}

a{
text-decoration:none;
color:inherit;
}

header{
position:fixed;
top:0;
left:0;
width:100%;
padding:18px 8%;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(0,0,0,0.45);
backdrop-filter:blur(12px);
z-index:1000;
border-bottom:1px solid rgba(255,255,255,0.08);
}

.logo{
font-size:30px;
font-weight:700;
background:linear-gradient(90deg,#00c6ff,#ffd700);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

nav{
display:flex;
gap:30px;
}

nav a{
font-size:15px;
font-weight:500;
transition:0.3s;
}

nav a:hover{
color:#00c6ff;
}

.hero{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:130px 8% 80px;
text-align:center;
background:
linear-gradient(rgba(3,10,20,0.88),rgba(3,10,20,0.92)),
url('https://images.unsplash.com/photo-1520607162513-77705c0f0d4a?q=80&w=1600&auto=format&fit=crop');
background-size:cover;
background-position:center;
}

.hero-content{
max-width:850px;
}

.badge{
display:inline-block;
padding:10px 18px;
border-radius:40px;
background:rgba(0,198,255,0.12);
border:1px solid rgba(0,198,255,0.3);
color:#7fe7ff;
font-size:14px;
margin-bottom:25px;
}

.hero h1{
font-size:68px;
line-height:1.1;
margin-bottom:25px;
}

.hero h1 span{
background:linear-gradient(90deg,#00c6ff,#ffd700);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.hero p{
font-size:18px;
line-height:1.8;
color:#cfd9e6;
margin-bottom:40px;
}

.buttons{
display:flex;
justify-content:center;
gap:18px;
flex-wrap:wrap;
}

.btn{
padding:16px 35px;
border-radius:14px;
font-size:16px;
font-weight:600;
transition:0.3s;
}

.btn-primary{
background:linear-gradient(90deg,#00c6ff,#0072ff);
}

.btn-primary:hover{
transform:translateY(-5px);
box-shadow:0 10px 30px rgba(0,198,255,0.35);
}

.btn-secondary{
border:1px solid rgba(255,255,255,0.15);
background:rgba(255,255,255,0.05);
}

.btn-secondary:hover{
background:rgba(255,255,255,0.08);
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
padding:90px 8%;
background:#0d1728;
}

.stat-card{
background:#111d31;
padding:40px;
border-radius:24px;
text-align:center;
border:1px solid rgba(255,255,255,0.05);
transition:0.3s;
}

.stat-card:hover{
transform:translateY(-8px);
}

.stat-card h2{
font-size:42px;
color:#00c6ff;
margin-bottom:10px;
}

.section{
padding:100px 8%;
}

.section-title{
text-align:center;
margin-bottom:60px;
}

.section-title h2{
font-size:44px;
margin-bottom:15px;
}

.section-title p{
max-width:700px;
margin:auto;
line-height:1.8;
color:#b7c3d0;
}

.categories{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:25px;
}

.category-card{
background:#101b2d;
padding:35px;
border-radius:24px;
border:1px solid rgba(255,255,255,0.05);
transition:0.3s;
}

.category-card:hover{
transform:translateY(-8px);
border-color:#00c6ff;
}

.category-card h3{
font-size:24px;
margin-bottom:18px;
}

.category-card ul{
list-style:none;
display:flex;
flex-direction:column;
gap:12px;
color:#c9d3df;
}

.articles{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:28px;
}

.article-card{
background:#101b2d;
border-radius:24px;
overflow:hidden;
border:1px solid rgba(255,255,255,0.05);
transition:0.3s;
}

.article-card:hover{
transform:translateY(-8px);
}

.article-card img{
width:100%;
height:220px;
object-fit:cover;
}

.article-content{
padding:28px;
}

.article-content span{
color:#00c6ff;
font-size:13px;
}

.article-content h3{
font-size:24px;
margin:14px 0;
line-height:1.4;
}

.article-content p{
line-height:1.8;
color:#c7d0dc;
margin-bottom:20px;
}
